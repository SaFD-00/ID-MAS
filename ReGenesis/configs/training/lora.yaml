# LoRA Training Configuration for Large Models (70B+)

training:
  # Higher LR for LoRA
  learning_rate: 2.0e-5
  num_epochs: 3
  warmup_ratio: 0.03
  lr_scheduler: "cosine"

  # Batch settings for large models
  per_device_batch_size: 1
  gradient_accumulation_steps: 16  # effective batch size = 16

  # Precision
  bf16: true
  fp16: false

  # Memory optimization (required for 70B+)
  gradient_checkpointing: true
  max_grad_norm: 1.0

  # Quantization
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

  # Sequence length
  model_max_length: 4096

  # Logging and saving
  logging_steps: 10
  save_steps: 500
  save_total_limit: 3

lora:
  # LoRA hyperparameters
  r: 64
  lora_alpha: 16
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

  # Target modules for decoder-only models
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
