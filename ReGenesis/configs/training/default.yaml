# Default Training Configuration for ReGenesis
# Based on hyperparameters from the ReGenesis paper (ICLR 2025)

training:
  # Core hyperparameters
  learning_rate: 1.0e-6
  num_epochs: 3
  warmup_ratio: 0.03
  lr_scheduler: "cosine"

  # Batch settings
  per_device_batch_size: 2
  gradient_accumulation_steps: 8  # effective batch size = 16

  # Precision
  bf16: true
  fp16: false

  # Memory optimization
  gradient_checkpointing: true
  max_grad_norm: 1.0

  # Regularization
  weight_decay: 0.1

  # Sequence length
  model_max_length: 4096

  # Logging and saving
  logging_steps: 10
  save_steps: 500
  save_total_limit: 3

  # Data loading
  dataloader_num_workers: 4

  # Reproducibility
  seed: 42

generation:
  # Reasoning path generation settings
  temperature: 0.85
  top_p: 0.9
  max_tokens: 2048
  num_samples_per_task: 25

filtering:
  # Data filtering settings
  max_paths_per_task: 5
  max_token_length: 800
