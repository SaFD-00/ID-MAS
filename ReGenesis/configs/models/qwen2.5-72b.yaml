# Qwen2.5 72B Instruct Configuration
model:
  name: "Qwen/Qwen2.5-72B-Instruct"
  template: "qwen"
  system_message: "You are a helpful assistant."
  tensor_parallel: 4
  max_model_len: 4096
  dtype: "bfloat16"

generation:
  temperature: 1.2
  top_p: 0.9
  max_tokens: 2048
  num_samples: 20
  stop_tokens:
    - "<|im_end|>"
    - "<|endoftext|>"

training:
  strategy: "lora"
  learning_rate: 2e-5
  num_epochs: 3
  per_device_batch_size: 1
  gradient_accumulation_steps: 16
  warmup_ratio: 0.03
  lr_scheduler: "cosine"
  gradient_checkpointing: true
  bf16: true
  load_in_4bit: true

  lora:
    r: 64
    alpha: 16
    dropout: 0.05
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"

resources:
  gpu_memory: "~80GB per GPU"
  recommended_gpus: 4
